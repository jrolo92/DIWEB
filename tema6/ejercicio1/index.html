<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio Optimizado</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #191970;
        }

        h3 a {
            color:black;
        }

        a:hover{
            color:rgba(0, 0, 0, 0.778);
        }

        .audio-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(#3498db);
        }

        audio {
            width: 300px;
            height: 45px;
            margin-top: 1rem;
            border-radius: 8px;
        }

        audio::-webkit-media-controls-panel {
            background-color: #e3f2fd;
        }


    </style>
</head>
<body>

    <section class="audio-card">
        <h2>Derrick Cross Never Too Much</h2>
        <p>Formato WAV / Formato MP3</p>
        
        <audio 
            controls 
            aria-label="Reproductor de audio">
            
            <source src="./audio/Derrick-Cross-Never-Too-Much.wav" type="audio/wav">
            
            <p>Lo sentimos, tu navegador no soporta el elemento de audio.</p>
        </audio>

        <audio 
            controls 
            aria-label="Reproductor de audio">
            
            <source src="./audio/Derrick Cross - Never Too Much [Audio].mp3" type="audio/mpeg">
            
            <p>Lo sentimos, tu navegador no soporta el elemento de audio.</p>
        </audio>

        <h3><a href="comparativa">Tabla comparativa entre formatos</a></h3>

    </section>

</body>
</html>
